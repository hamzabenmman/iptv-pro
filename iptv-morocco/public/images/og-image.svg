<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#020617"/>
  <!-- WC2026 Grid Pattern -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#wcGrid)" opacity="0.05"/>
  <defs>
    <pattern id="wcGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#D4AF37" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Gold Gradient Background -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#goldGradient)" opacity="0.08"/>
  <defs>
    <linearGradient id="goldGradient" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Gold Lines -->
  <line x1="100" y1="200" x2="1100" y2="200" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="430" x2="1100" y2="430" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Trophy Icon (simplified) -->
  <rect x="540" y="100" width="120" height="120" rx="60" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  
  <!-- Brand Text -->
  <text x="600" y="290" text-anchor="middle" fill="white" font-family="'Inter', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="2">IPTV</text>
  <text x="600" y="370" text-anchor="middle" fill="#D4AF37" font-family="'Inter', Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="4">PRO</text>
  
  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" fill="#94a3b8" font-family="'Inter', Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="3">PREMIUM IPTV SERVICE</text>
  
  <!-- Features -->
  <text x="600" y="490" text-anchor="middle" fill="#D4AF37" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="2">25,000+ CHANNELS  ·  4K & 8K  ·  24/7 SUPPORT</text>
</svg>
